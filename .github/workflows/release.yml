name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: Windows, runner: windows-latest, artifact: windows-x64, ext: zip }
          - { name: Linux,   runner: ubuntu-latest,  artifact: linux-amd64, ext: tar.gz }
          - { name: macOS,   runner: macos-latest,   artifact: macos-arm64, ext: tar.gz }

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Embed resources
      run: python tools/embed_resources.py examples/app/resources src/generated resources

    - name: Configure (CMake - Windows)
      if: runner.os == 'Windows'
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Configure (CMake - Linux/macOS)
      if: runner.os != 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target nui-example

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $dir = "nui-${{ matrix.os.artifact }}"
        New-Item -ItemType Directory -Path $dir -Force
        Copy-Item build/bin/Release/nui-example.exe "$dir/"
        Compress-Archive -Path $dir -DestinationPath "$dir.zip"

    - name: Package (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        DIR="nui-${{ matrix.os.artifact }}"
        mkdir -p "$DIR"
        cp build/bin/nui-example "$DIR/"
        tar czf "$DIR.tar.gz" "$DIR"

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        files: nui-${{ matrix.os.artifact }}.${{ matrix.os.ext }}
